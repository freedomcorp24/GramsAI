worker_processes auto;
events { worker_connections 1024; }
http {
    client_max_body_size 25m;
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;
    # Gateway (Go API on unix socket) upstream
    upstream gramsai_gateway {
        server unix:/run/gramsai/api.sock;
    }
    server {
        listen 80;
        root /opt/gramsai/web;

        # ---- internal auth gate (nginx asks gateway: valid session?) ----
        location = /__auth_check {
            internal;
            proxy_pass http://gramsai_gateway/auth/check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }
        # ---- payment gate (nginx asks gateway: session valid AND paid?) ----
        location = /__paid_check {
            internal;
            proxy_pass http://gramsai_gateway/auth/paid-check;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Host $host;
            proxy_set_header Cookie $http_cookie;
        }

        # ---- named handlers for gate outcomes ----
        # 401 (logged OUT): serve the landing page CONTENT in-place. The "= @landing"
        # form keeps the original URL (no redirect) and adopts the landing's 200
        # status — so grams.chat just shows the landing.
        # 403 (logged in, unpaid): send to the subscribe page.
        error_page 401 = @landing;
        location @landing {
            rewrite ^ /welcome break;
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }
        location @to_subscribe { return 302 /subscribe; }

        # ---- always-open (no auth) ----
        # Landing page also reachable directly at /welcome (logged-in users get
        # bounced to the app by the handler).
        location = /welcome {
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }
        # Login page + auth API -> gateway
        location ^~ /auth/ {
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location = /login {
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        # Payment routes -> gateway. /pay/create + /pay/coins check the session
        # cookie inside the handler; /pay/ipn is NOWPayments' webhook (HMAC-verified).
        # Neither goes behind the login gate, or the provider callback would be 302'd.
        location ^~ /pay/ {
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 60;
        }

        # Account self-service -> gateway. Session is checked inside each handler
        # (resolveCaller / getUID); no login gate so a missing session returns a
        # JSON 401 instead of a landing redirect that would break fetch().
        location ^~ /account/ {
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_read_timeout 60;
        }
        # Subscribe page: must be LOGGED IN (auth_check) but NOT yet paid. A logged
        # -out hit here 401s and inherits the server-level error_page -> landing.
        location = /subscribe {
            auth_request /__auth_check;
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
        }
        # Static assets (so the login/landing CSS/JS + OpenCode bundle can load)
        location /assets/ { expires 30d; }
        # VAD assets (silero onnx + onnxruntime wasm/mjs) — static, public, correct MIME.
        # Must be a real file serve (not the SPA catch-all) or .mjs returns index.html.
        location /vad/ {
            default_type application/octet-stream;
            types {
                application/wasm wasm;
                text/javascript js mjs;
            }
            try_files $uri =404;
            expires 30d;
        }
        location = /favicon-v3.ico { try_files $uri =404; }
        location = /favicon-v3.svg { try_files $uri =404; }
        location = /favicon-96x96-v3.png { try_files $uri =404; }
        location = /favicon.ico { try_files $uri =404; }
        location = /favicon.svg { try_files $uri =404; }
        location = /site.webmanifest { try_files $uri =404; }
        location = /apple-touch-icon-v3.png { try_files $uri =404; }

        # LLM gateway: containers' OpenCode calls this. SSE streaming, no buffering.
        # NOTE: containers authenticate with their own gsk- token, NOT the session
        # cookie, so this stays OUTSIDE the cookie gate.
        location /v1/chat/completions {
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
            chunked_transfer_encoding off;
        }

        # Memory search: containers' search_memory tool calls this with their gsk-
        # token (NOT a session cookie), so it stays OUTSIDE the cookie gate — same
        # as /v1/. The Go handler validates the Bearer token itself.
        location = /api/memory/search {
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30;
        }

        # ---- gated: OpenCode frontend (requires a valid PAID session) ----
        location ~ ^/(agent|api|command|config|event|experimental|file|find|formatter|global|instance|log|lsp|mcp|path|permission|project|provider|pty|question|session|skill|sync|tui|vcs)(/|$) {
            client_max_body_size 25m;
            auth_request /__paid_check;
            error_page 401 = @landing;
            error_page 403 = @to_subscribe;
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400;
        }
        # Voice STT: browser mic audio -> gateway -> OpenRouter whisper -> {text}.
        # Paid-gated like /dl; cookie forwarded so the handler's getUID resolves the user.
        location = /api/audio/speech {
            client_max_body_size 25m;
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_buffering off;
            proxy_read_timeout 120;
        }

        location = /api/audio/transcribe {
            client_max_body_size 25m;
            # No auth_request gate: the handler does getUID + the same paid/budget
            # gate as chat, returning JSON 401/402 instead of a landing redirect
            # that would 405/break the fetch(). Mirrors /account/ behavior.
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_buffering off;
            proxy_read_timeout 120;
        }

        # Workspace download -> gateway, which resolves the session to a user and
        # streams a zip of THAT user's chat folder (via the host's control-agent).
        location /dl {
            auth_request /__paid_check;
            error_page 401 = @landing;
            error_page 403 = @to_subscribe;
            proxy_pass http://gramsai_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Cookie $http_cookie;
            proxy_buffering off;
            proxy_read_timeout 300;
        }
        # Root: gated, serves the SPA shell at the clean "/" URL. The app's own
        # router renders Home at "/"; opening/typing a chat creates a fresh
        # worktree and the app pushes the /:dir/session URL itself. No forced
        # /workspace redirect. Logged out -> 401 -> @landing. Unpaid -> 403 -> subscribe.
        location = / {
            auth_request /__paid_check;
            error_page 401 = @landing;
            error_page 403 = @to_subscribe;
            try_files /index.html =404;
        }
        # App shell + SPA routes (gated). Logged out -> landing; unpaid -> subscribe.
        location / {
            auth_request /__paid_check;
            error_page 401 = @landing;
            error_page 403 = @to_subscribe;
            try_files $uri /index.html;
        }
    }

    # ===================================================================
    # ADMIN vhost — SEPARATE from grams.chat. Internal interface ONLY.
    # ===================================================================
    server {
        listen 10.152.152.111:8443;
        server_name _;
        root /opt/gramsai/admin-web;
        index index.html;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        location /api/ {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 60s;
        }
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
