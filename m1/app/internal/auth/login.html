<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>grams</title>
    <link rel="icon" type="image/svg+xml" href="/favicon-v3.svg" />
    <link rel="icon" type="image/png" href="/favicon-96x96-v3.png" sizes="96x96" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-v3.png" />
<style>
  :root{
    --bg:#0a0c0f; --panel:#0e1218; --line:#222a33; --txt:#e6edf3;
    --dim:#7d8896; --accent:#3fb950; --accent2:#58a6ff; --danger:#f85149;
    --field:#0b0f14;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SFMono-Regular","Menlo","Consolas",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg);color:var(--txt);font-family:var(--sans);
    min-height:100dvh;display:flex;
  }
  /* ---- left auth pane ---- */
  /* GRAMSAI_LOGIN_V2 */
  .pane{
    flex:0 0 33.4%;min-width:0;display:flex;align-items:center;justify-content:flex-start;
    padding:40px 28px 40px 44px;
  }
  .box{width:min(100%,380px)}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:46px}
  .brand .mark{
    width:34px;height:34px;flex:0 0 auto;border-radius:9px;
    display:grid;place-items:center;
    background:linear-gradient(150deg,#163b22,#0e1a12);border:1px solid #1f5132;
  }
  .brand .mark svg{width:20px;height:20px;display:block}
  .brand .name{font-size:15px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
  .brand .name .dot{color:var(--accent)}
  h1{font-size:38px;line-height:1.12;font-weight:800;letter-spacing:-.02em;margin:0 0 14px}
  .sub{color:var(--dim);font-size:14px;line-height:1.55;margin:0 0 30px}
  label{display:block;font-size:13px;color:#c3ccd6;margin:0 0 8px;font-weight:500}
  .field{position:relative;margin-bottom:18px}
  input{
    width:100%;background:var(--field);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);font-family:var(--sans);font-size:15px;padding:13px 14px;
    transition:border-color .15s,box-shadow .15s;
  }
  input::placeholder{color:#4a5562}
  input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px #3fb95022}
  .eye{
    position:absolute;right:10px;top:50%;transform:translateY(-50%);
    width:30px;height:30px;border:0;background:transparent;color:var(--dim);
    cursor:pointer;display:grid;place-items:center;border-radius:7px;
  }
  .eye:hover{color:var(--txt);background:#ffffff0d}
  .eye svg{width:18px;height:18px}
  .row{display:flex;align-items:center;justify-content:space-between;margin:2px 0 22px}
  .remember{display:flex;align-items:center;gap:8px;color:var(--dim);font-size:13px;cursor:pointer;user-select:none}
  .remember input{width:16px;height:16px;margin:0;accent-color:var(--accent);cursor:pointer}
  .link{color:var(--accent);font-size:13px;text-decoration:none;cursor:pointer;background:none;border:0;font-family:inherit;padding:0}
  .link:hover{text-decoration:underline}
  .btn{
    width:100%;border:0;border-radius:10px;background:var(--accent);color:#04210c;
    font-family:var(--sans);font-weight:700;font-size:15px;padding:14px;cursor:pointer;
    transition:filter .15s,box-shadow .15s;box-shadow:0 8px 30px -10px #3fb95099;
  }
  .btn:hover{filter:brightness(1.07)}
  .btn:disabled{opacity:.6;cursor:default;box-shadow:none}
  .err{color:var(--danger);font-size:13px;min-height:18px;margin-top:12px;text-align:center}
  .divider{display:flex;align-items:center;gap:14px;color:var(--dim);font-size:13px;margin:26px 0}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}
  .social{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .social button{
    height:48px;border:1px solid var(--line);background:#0e131a;border-radius:10px;
    cursor:pointer;display:grid;place-items:center;transition:background .15s,border-color .15s;
  }
  .social button:hover{background:#141b24;border-color:#2c3744}
  .social svg{width:20px;height:20px;display:block}
  .foot{text-align:center;color:var(--dim);font-size:13px;margin-top:28px}
  .foot .link{font-weight:600}
  /* ---- right cosmic pane ---- */
  .art{
    flex:1 1 66.6%;min-width:0;position:relative;overflow:hidden;
    background:#05070a;
  }
  .art svg{position:absolute;inset:0;width:100%;height:100%;display:block}
  /* GRAMSAI_LOGIN_BG */
  .art img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block}
  .art::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,var(--bg) 0%,rgba(10,12,15,.55) 14%,rgba(10,12,15,.12) 34%,transparent 55%)}
  /* GRAMSAI_MOBILE_FIX */
  @media (max-width:880px){
    body{display:block;min-height:100dvh}
    .art{
      display:block;position:relative;width:100%;height:42vh;flex:none;
    }
    .art img,.art svg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center}
    .art::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,12,15,0) 40%,rgba(10,12,15,.5) 75%,var(--bg) 100%)}
    .pane{
      display:block;width:100%;flex:none;
      padding:26px 22px 48px;background:transparent;
    }
    .box{width:100%;max-width:420px;margin:0 auto}
  }
  /* GRAMSAI_CONSENT */
  #consent-block{display:none;margin:6px 0 14px}
  #consent-block.show{display:block}
  .consent-row{display:flex;gap:9px;align-items:flex-start;font-size:12.5px;color:var(--dim);line-height:1.5}
  .consent-row input{margin-top:2px;flex:0 0 auto;width:15px;height:15px;accent-color:var(--accent)}
  .consent-row input:disabled{opacity:.4;cursor:not-allowed}
  .consent-row a{color:var(--accent);text-decoration:none;cursor:pointer}
  .consent-row a:hover{text-decoration:underline}
  .consent-hint{margin:6px 0 0 24px;font-size:11px;color:#6b7682}
  #lgl-ov{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:24px}
  #lgl-ov.show{display:flex}
  .lgl-box{background:#16181d;border:1px solid #2a2f37;border-radius:14px;max-width:720px;width:100%;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 24px 60px -16px rgba(0,0,0,.7)}
  .lgl-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #2a2f37}
  .lgl-head .t{font-weight:600;font-size:16px;color:#e8eaed}
  .lgl-head .x{background:transparent;border:0;color:#8b939c;font-size:13px;cursor:pointer;padding:4px 8px}
  .lgl-body{overflow:auto;padding:18px 22px}
  .lgl-eff{font-size:12px;font-style:italic;color:#8b939c;margin-bottom:16px}
  .lgl-h{font-weight:600;font-size:14px;color:#e8eaed;margin:0 0 7px}
  .lgl-p{font-size:13px;line-height:1.6;color:#c7ccd1;margin:0 0 10px}
  .lgl-foot{padding:10px 20px;border-top:1px solid #2a2f37;font-size:11px;color:#6b7682;text-align:center}
</style>
</head>
<body>
  <div class="pane">
    <div class="box">
      <div class="brand">
        <span class="mark">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2 3 7v10l9 5 9-5V7l-9-5Z" stroke="#3fb950" stroke-width="1.6" stroke-linejoin="round"/>
            <text x="12" y="12" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="11" font-weight="800" fill="#3fb950">g</text>
          </svg>
        </span>
        <span class="name">GRAMS<span class="dot">.</span>AI</span>
      </div>

      <h1>Access the power<br>of AI</h1>
      <p class="sub" id="sub">Sign in to unlock the full potential of grams.</p>

<div id="cred-block">
      <label for="u" id="lbl-u">Username</label>
      <div class="field">
        <input id="u" autocomplete="username" autocapitalize="off" spellcheck="false" placeholder="your handle">
      </div>

      <label for="p">Password</label>
      <div class="field">
        <input id="p" type="password" autocomplete="current-password" placeholder="••••••••">
        <button class="eye" id="eye" type="button" aria-label="Show password">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>

      <div class="row">
        <label class="remember"><input type="checkbox" id="remember">Remember me</label>
        <button class="link" type="button" id="forgot">Forgot password?</button>
      </div>

      <div id="consent-block">
        <label class="consent-row">
          <input type="checkbox" id="consent" disabled>
          <span>I am at least 18 years old and I agree to the <a id="open-terms">Terms &amp; Conditions</a>.</span>
        </label>
        <div class="consent-hint" id="consent-hint">Open and read the Terms &amp; Conditions to continue.</div>
      </div>
      <button class="btn" id="go">Sign in</button>
      <div class="err" id="err"></div>

      <div class="divider">or continue with</div>
      <div class="social">
        <button type="button" aria-label="Google">
          <svg viewBox="0 0 24 24"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6.1s2.7-6.1 6-6.1c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.9 3.4 14.7 2.5 12 2.5 6.9 2.5 2.8 6.6 2.8 11.7S6.9 21 12 21c5.3 0 8.8-3.7 8.8-9 0-.6-.06-1-.15-1.5H12Z"/></svg>
        </button>
        <button type="button" aria-label="GitHub">
          <svg viewBox="0 0 24 24"><path fill="#e6edf3" d="M12 2C6.5 2 2 6.6 2 12.2c0 4.5 2.9 8.3 6.8 9.6.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.4-3.4-1.4-.5-1.2-1.1-1.5-1.1-1.5-.9-.6.07-.6.07-.6 1 .07 1.5 1.05 1.5 1.05.9 1.5 2.3 1.1 2.9.85.09-.66.35-1.1.6-1.36-2.2-.26-4.6-1.13-4.6-5.02 0-1.1.4-2 1.05-2.7-.1-.26-.45-1.3.1-2.7 0 0 .85-.27 2.8 1.03a9.6 9.6 0 0 1 5.1 0c1.95-1.3 2.8-1.03 2.8-1.03.55 1.4.2 2.44.1 2.7.65.7 1.05 1.6 1.05 2.7 0 3.9-2.4 4.75-4.6 5 .35.3.67.9.67 1.8v2.7c0 .3.2.6.7.5 3.9-1.3 6.8-5.1 6.8-9.6C22 6.6 17.5 2 12 2Z"/></svg>
        </button>
        <button type="button" aria-label="Microsoft">
          <svg viewBox="0 0 24 24"><path fill="#F25022" d="M3 3h8.4v8.4H3z"/><path fill="#7FBA00" d="M12.6 3H21v8.4h-8.4z"/><path fill="#00A4EF" d="M3 12.6h8.4V21H3z"/><path fill="#FFB900" d="M12.6 12.6H21V21h-8.4z"/></svg>
        </button>
      </div>

      <div class="foot">
        <span id="foot-q">Don't have an account?</span>
        <button class="link" type="button" id="toggle">Sign up</button>
      </div>
      </div>

      <!-- GRAMSAI_RESET: forgot-password via recovery code (hidden until needed) -->
      <div id="reset-wrap" style="display:none">
        <label for="r-user">Username</label>
        <div class="field">
          <input id="r-user" autocomplete="username" autocapitalize="off" spellcheck="false" placeholder="your handle">
        </div>
        <label for="r-code">Recovery code</label>
        <div class="field">
          <input id="r-code" autocapitalize="off" spellcheck="false" placeholder="XXXXX-XXXXX">
        </div>
        <label for="r-pw">New password</label>
        <div class="field">
          <input id="r-pw" type="password" autocomplete="new-password" placeholder="at least 8 characters">
        </div>
        <button class="btn" id="r-go">Reset password</button>
        <div class="err" id="r-err"></div>
        <div class="foot" style="margin-top:14px">
          <button class="link" type="button" id="r-back">Back to sign in</button>
        </div>
      </div>

      <!-- GRAMSAI_2FA_LOGIN: challenge step (hidden until needed) -->
      <div id="totp-wrap" style="display:none">
        <label for="totp" id="totp-label">Authentication code</label>
        <div class="field">
          <input id="totp" inputmode="numeric" autocomplete="one-time-code" placeholder="123456" maxlength="11" autocapitalize="off" spellcheck="false">
        </div>
        <button class="btn" id="totp-go">Verify</button>
        <div class="err" id="totp-err"></div>
        <div class="foot" style="margin-top:14px">
          <button class="link" type="button" id="totp-recovery">Use a recovery code instead</button>
        </div>
      </div>
    </div>
  </div>

  <div class="art" aria-hidden="true">
    <img src="/assets/subscribe-bg-v1.jpg" alt="">
  </div>

<script>
  var mode="login";
  var $=function(s){return document.querySelector(s)};

  function setMode(m){
    mode=m;
    var login=m==="login";
    $("#go").textContent=login?"Sign in":"Create account";
    var cb=document.getElementById("consent-block"); if(cb) cb.classList.toggle("show", !login);
    if(login){ var cc=document.getElementById("consent"); if(cc){ cc.checked=false; } }
    $("#sub").textContent=login
      ? "Sign in to unlock the full potential of grams."
      : "Create an account to unlock the full potential of grams.";
    $("#foot-q").textContent=login?"Don't have an account?":"Already have an account?";
    $("#toggle").textContent=login?"Sign up":"Sign in";
    $("#p").setAttribute("autocomplete",login?"current-password":"new-password");
    $("#err").textContent="";
  }
  $("#toggle").onclick=function(){setMode(mode==="login"?"signup":"login")};

  // show/hide password
  $("#eye").onclick=function(){
    var p=$("#p");
    p.type=p.type==="password"?"text":"password";
  };

  // forgot password -> show the recovery-code reset form
  function showReset(){
    $("#cred-block").style.display="none";
    var tw=$("#totp-wrap"); if(tw) tw.style.display="none";
    $("#sub").textContent="Reset your password with a 2FA recovery code.";
    $("#reset-wrap").style.display="block";
    setTimeout(function(){$("#r-user").focus()},50);
  }
  function hideReset(){
    $("#reset-wrap").style.display="none";
    $("#cred-block").style.display="block";
    $("#sub").textContent="Sign in to unlock the full potential of grams.";
    $("#r-err").textContent="";
  }
  $("#forgot").onclick=function(){ showReset(); };
  $("#r-back").onclick=function(){ hideReset(); };
  async function submitReset(){
    $("#r-err").style.color="var(--danger)";
    var u=$("#r-user").value.trim(), c=$("#r-code").value.trim(), p=$("#r-pw").value;
    if(!u||!c||!p){$("#r-err").textContent="Fill in all fields";return;}
    if(p.length<8){$("#r-err").textContent="New password must be at least 8 characters";return;}
    $("#r-go").disabled=true;$("#r-err").textContent="";
    try{
      var r=await fetch("/auth/reset",{
        method:"POST",headers:{"Content-Type":"application/json"},
        credentials:"same-origin",
        body:JSON.stringify({username:u,recovery_code:c,new_password:p})
      });
      var d={};try{d=await r.json()}catch(e){}
      if(!r.ok){$("#r-err").textContent=d.error||("error "+r.status);$("#r-go").disabled=false;return;}
      $("#r-err").style.color="var(--accent)";
      $("#r-err").textContent="Password reset. You can sign in now.";
      setTimeout(function(){ hideReset(); }, 1400);
    }catch(e){$("#r-err").textContent="network error";$("#r-go").disabled=false;}
  }
  $("#r-go").onclick=submitReset;
  $("#r-pw").addEventListener("keydown",function(e){if(e.key==="Enter")submitReset()});

  var pendingTok="";
  var recoveryMode=false;

  function showTotp(){
    $("#cred-block").style.display="none";
    $("#sub").textContent="Enter the code from your authenticator app.";
    $("#totp-wrap").style.display="block";
    setTimeout(function(){$("#totp").focus()},50);
  }

  async function submit(){
    $("#err").style.color="var(--danger)";
    var u=$("#u").value.trim(), p=$("#p").value;
    if(!u||!p){$("#err").textContent="Enter username and password";return;}
    if(mode!=="login"){ var cc=document.getElementById("consent"); if(!cc||!cc.checked){$("#err").textContent="Please read and accept the Terms & Conditions to create an account";return;} } /* GRAMSAI_CONSENT */
    $("#go").disabled=true;$("#err").textContent="";
    try{
      var r=await fetch("/auth/"+(mode==="login"?"login":"register"),{
        method:"POST",headers:{"Content-Type":"application/json"},
        credentials:"same-origin",body:JSON.stringify({username:u,password:p})
      });
      var d={};try{d=await r.json()}catch(e){}
      if(!r.ok){$("#err").textContent=d.error||("error "+r.status);$("#go").disabled=false;return;}
      if(d.needs_totp){ pendingTok=d.pending; showTotp(); return; }
      window.location.href="/";
    }catch(e){$("#err").textContent="network error";$("#go").disabled=false;}
  }

  async function submitTotp(){
    $("#totp-err").style.color="var(--danger)";
    var code=$("#totp").value.trim();
    if(!code){$("#totp-err").textContent="Enter your code";return;}
    $("#totp-go").disabled=true;$("#totp-err").textContent="";
    try{
      var r=await fetch("/auth/login/totp",{
        method:"POST",headers:{"Content-Type":"application/json"},
        credentials:"same-origin",body:JSON.stringify({pending:pendingTok,code:code})
      });
      var d={};try{d=await r.json()}catch(e){}
      if(!r.ok){$("#totp-err").textContent=d.error||("error "+r.status);$("#totp-go").disabled=false;return;}
      window.location.href="/";
    }catch(e){$("#totp-err").textContent="network error";$("#totp-go").disabled=false;}
  }

  $("#go").onclick=submit;
  $("#u").addEventListener("keydown",function(e){if(e.key==="Enter")submit()});
  $("#p").addEventListener("keydown",function(e){if(e.key==="Enter")submit()});
  $("#totp-go").onclick=submitTotp;
  $("#totp").addEventListener("keydown",function(e){if(e.key==="Enter")submitTotp()});

  // GRAMSAI_OAUTH: wire social buttons (by aria-label) to the OAuth start endpoints.
  (function(){
    function go(p){ window.location.href = "/auth/oauth/"+p+"/start"; }
    var g  = document.querySelector('.social button[aria-label="Google"]');
    var gh = document.querySelector('.social button[aria-label="GitHub"]');
    var ms = document.querySelector('.social button[aria-label="Microsoft"]');
    if(g)  g.addEventListener("click", function(){ go("google"); });
    if(gh) gh.addEventListener("click", function(){ go("github"); });
    if(ms) ms.style.display = "none";                 // not registered -> hide
    // with Microsoft hidden, make the row two columns so the buttons fill nicely
    var row = document.querySelector(".social");
    if(row && ms) row.style.gridTemplateColumns = "repeat(2,1fr)";
  })();

    $("#totp-recovery").onclick=function(){
    recoveryMode=!recoveryMode;
    if(recoveryMode){
      $("#totp-label").textContent="Recovery code";
      $("#totp").placeholder="XXXXX-XXXXX"; $("#totp").setAttribute("inputmode","text");
      this.textContent="Use an authenticator code instead";
    }else{
      $("#totp-label").textContent="Authentication code";
      $("#totp").placeholder="123456"; $("#totp").setAttribute("inputmode","numeric");
      this.textContent="Use a recovery code instead";
    }
    $("#totp").value=""; $("#totp").focus();
  };


/* GRAMSAI_CONSENT */
